<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI War Room - Dynamic URLs</title>
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --panel-bg: #141414;
            --gold: #d4af37;
            --text-light: #e0e0e0;
            --border-color: #2a2a2a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* شريط التحكم الرئيسي */
        .master-header {
            background-color: var(--panel-bg);
            border-bottom: 2px solid var(--gold);
            padding: 15px 20px;
            display: flex;
            gap: 15px;
            align-items: center;
            justify-content: center;
            height: 70px;
        }

        .master-input {
            width: 50%;
            padding: 10px 15px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-size: 16px;
            outline: none;
        }

        .master-input:focus { border-color: var(--gold); }

        .btn {
            background-color: var(--gold);
            color: var(--bg-dark);
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover { background-color: #f3c12c; transform: scale(1.02); }
        .master-btn { padding: 10px 25px; font-size: 14px; }

        /* شبكة النماذج */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 8px;
            padding: 8px;
            flex-grow: 1;
            height: calc(100vh - 70px);
        }

        .ai-panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: border-color 0.3s ease;
        }

        .ai-panel:hover { border-color: var(--gold); }

        /* شريط التحكم الخاص بكل نافذة */
        .panel-header {
            background-color: #000;
            padding: 6px 10px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .url-input {
            flex-grow: 1;
            padding: 5px 10px;
            background-color: #1a1a1a;
            border: 1px solid var(--border-color);
            color: var(--gold);
            border-radius: 4px;
            font-size: 12px;
            outline: none;
            direction: ltr; /* اتجاه الكتابة للروابط من اليسار لليمين */
        }

        .url-input:focus { border-color: var(--gold); }
        
        .url-btn { padding: 5px 12px; font-size: 12px; }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: #fff;
        }
    </style>
</head>
<body>

    <div class="master-header">
        <input type="text" id="masterPrompt" class="master-input" placeholder="اكتب الأمر هنا، ثم اضغط نسخ ليتم وضعه في الحافظة للصقه سريعاً...">
        <button class="btn master-btn" onclick="copyToClipboard()">نسخ الأمر (Copy)</button>
    </div>

    <div class="grid-container">
        <div class="ai-panel">
            <div class="panel-header">
                <input type="text" id="url1" class="url-input" value="https://claude.ai/">
                <button class="btn url-btn" onclick="loadUrl('frame1', 'url1')">فتح</button>
            </div>
            <iframe id="frame1" src="https://claude.ai/"></iframe>
        </div>

        <div class="ai-panel">
            <div class="panel-header">
                <input type="text" id="url2" class="url-input" value="https://chat.deepseek.com/">
                <button class="btn url-btn" onclick="loadUrl('frame2', 'url2')">فتح</button>
            </div>
            <iframe id="frame2" src="https://chat.deepseek.com/"></iframe>
        </div>

        <div class="ai-panel">
            <div class="panel-header">
                <input type="text" id="url3" class="url-input" value="https://gemini.google.com/">
                <button class="btn url-btn" onclick="loadUrl('frame3', 'url3')">فتح</button>
            </div>
            <iframe id="frame3" src="https://gemini.google.com/"></iframe>
        </div>

        <div class="ai-panel">
            <div class="panel-header">
                <input type="text" id="url4" class="url-input" value="https://chatgpt.com/">
                <button class="btn url-btn" onclick="loadUrl('frame4', 'url4')">فتح</button>
            </div>
            <iframe id="frame4" src="https://chatgpt.com/"></iframe>
        </div>

        <div class="ai-panel">
            <div class="panel-header">
                <input type="text" id="url5" class="url-input" value="https://kimi.moonshot.cn/">
                <button class="btn url-btn" onclick="loadUrl('frame5', 'url5')">فتح</button>
            </div>
            <iframe id="frame5" src="https://kimi.moonshot.cn/"></iframe>
        </div>

        <div class="ai-panel">
            <div class="panel-header">
                <input type="text" id="url6" class="url-input" value="https://hailuoai.video/">
                <button class="btn url-btn" onclick="loadUrl('frame6', 'url6')">فتح</button>
            </div>
            <iframe id="frame6" src="https://hailuoai.video/"></iframe>
        </div>
    </div>

    <script>
        // دالة نسخ الأمر الرئيسي
        function copyToClipboard() {
            const promptText = document.getElementById('masterPrompt').value;
            if (!promptText) return;

            navigator.clipboard.writeText(promptText).then(() => {
                const btn = document.querySelector('.master-btn');
                const originalText = btn.innerText;
                
                btn.innerText = "تم النسخ بنجاح! ✓";
                btn.style.backgroundColor = "#4CAF50"; 
                btn.style.color = "white";
                
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.style.backgroundColor = "var(--gold)";
                    btn.style.color = "var(--bg-dark)";
                }, 2000);
            }).catch(err => console.error('Error copying text: ', err));
        }

        // دالة تحميل الروابط داخل الإطارات
        function loadUrl(frameId, inputId) {
            let url = document.getElementById(inputId).value.trim();
            
            // إضافة https:// إذا نسي المستخدم كتابتها
            if (url !== "" && !url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
                document.getElementById(inputId).value = url;
            }
            
            if (url) {
                document.getElementById(frameId).src = url;
            }
        }

        // دعم الضغط على زر Enter لفتح الرابط مباشرة
        document.querySelectorAll('.url-input').forEach((input, index) => {
            input.addEventListener('keypress', function (e) {
                if (e.key === 'Enter') {
                    const frameId = 'frame' + (index + 1);
                    const inputId = 'url' + (index + 1);
                    loadUrl(frameId, inputId);
                }
            });
        });
    </script>

</body>
</html>
