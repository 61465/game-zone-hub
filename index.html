<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI War Room</title>
    <style>
        :root {
            /* ثيم الأسود والذهبي */
            --bg-dark: #0a0a0a;
            --panel-bg: #141414;
            --gold: #d4af37;
            --text-light: #e0e0e0;
            --border-color: #2a2a2a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* شريط التحكم العلوي */
        .header {
            background-color: var(--panel-bg);
            border-bottom: 2px solid var(--gold);
            padding: 15px 20px;
            display: flex;
            gap: 15px;
            align-items: center;
            justify-content: center;
            height: 70px;
        }

        .master-input {
            width: 50%;
            padding: 10px 15px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .master-input:focus {
            border-color: var(--gold);
        }

        .action-btn {
            background-color: var(--gold);
            color: var(--bg-dark);
            border: none;
            padding: 10px 25px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            background-color: #f3c12c;
            transform: scale(1.02);
        }

        /* شبكة النماذج السداسية */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 أعمدة */
            grid-template-rows: repeat(2, 1fr);    /* صفين */
            gap: 8px;
            padding: 8px;
            flex-grow: 1;
            height: calc(100vh - 70px);
        }

        .ai-panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: border-color 0.3s ease;
        }

        .ai-panel:hover {
            border-color: var(--gold); /* إضاءة الإطار بالذهبي عند تمرير الماوس */
        }

        .panel-title {
            background-color: #000;
            color: var(--gold);
            padding: 6px 15px;
            font-size: 12px;
            font-weight: bold;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
        }

        iframe, webview {
            width: 100%;
            height: 100%;
            border: none;
            background-color: #fff; /* خلفية بيضاء للنماذج التي لا تدعم الوضع الداكن */
        }
    </style>
</head>
<body>

    <div class="header">
        <input type="text" id="masterPrompt" class="master-input" placeholder="اكتب الأمر هنا، ثم اضغط نسخ ليتم وضعه في الحافظة للصقه سريعاً...">
        <button class="action-btn" onclick="copyToClipboard()">نسخ الأمر (Copy)</button>
    </div>

    <div class="grid-container">
        <div class="ai-panel">
            <div class="panel-title"><span>Claude 3.5</span> <span>(المراجع والمنطق)</span></div>
            <iframe src="https://claude.ai/" title="Claude"></iframe>
        </div>

        <div class="ai-panel">
            <div class="panel-title"><span>DeepSeek</span> <span>(التحليل العميق)</span></div>
            <iframe src="https://chat.deepseek.com/" title="DeepSeek"></iframe>
        </div>

        <div class="ai-panel">
            <div class="panel-title"><span>Gemini</span> <span>(البيانات الضخمة)</span></div>
            <iframe src="https://gemini.google.com/" title="Gemini"></iframe>
        </div>

        <div class="ai-panel">
            <div class="panel-title"><span>ChatGPT</span> <span>(المنسق والمدير)</span></div>
            <iframe src="https://chatgpt.com/" title="ChatGPT"></iframe>
        </div>

        <div class="ai-panel">
            <div class="panel-title"><span>Kimi</span> <span>(معالجة المستندات)</span></div>
            <iframe src="https://kimi.moonshot.cn/" title="Kimi"></iframe>
        </div>

        <div class="ai-panel">
            <div class="panel-title"><span>MiniMax</span> <span>(المهام السريعة)</span></div>
            <iframe src="https://hailuoai.video/" title="MiniMax"></iframe>
        </div>
    </div>

    <script>
        // دالة لنسخ النص لإرساله للنماذج بسرعة
        function copyToClipboard() {
            const promptText = document.getElementById('masterPrompt').value;
            if (!promptText) return;

            navigator.clipboard.writeText(promptText).then(() => {
                const btn = document.querySelector('.action-btn');
                const originalText = btn.innerText;
                
                // تأثير بصري عند نجاح النسخ
                btn.innerText = "تم النسخ بنجاح! ✓";
                btn.style.backgroundColor = "#4CAF50"; 
                btn.style.color = "white";
                
                // إعادة الزر لشكله الأصلي بعد ثانيتين
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.style.backgroundColor = "var(--gold)";
                    btn.style.color = "var(--bg-dark)";
                }, 2000);
            }).catch(err => {
                console.error('حدث خطأ أثناء النسخ: ', err);
            });
        }
    </script>

</body>
</html>
